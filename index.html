<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>하늘탑 🏯 몇 층까지 쌓을 수 있어?</title>
<meta name="description" content="한 손가락 탭으로 블록을 쌓아 하늘 끝까지! 친구와 최고 기록 대결.">
<meta property="og:title" content="하늘탑 🏯 몇 층까지 쌓을 수 있어?">
<meta property="og:description" content="한 손가락 탭으로 블록을 쌓아 하늘 끝까지! 지금 바로 도전 👆">
<meta property="og:type" content="website">
<meta property="og:image" content="https://serijawow.github.io/sky-tower/og.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="theme-color" content="#0b1026">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏯</text></svg>">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:#0b1026;
    touch-action:none;overscroll-behavior:none;
    user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;
    font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic','Segoe UI',sans-serif;color:#fff}
  canvas{display:block;position:fixed;inset:0}
  .screen{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;
    transition:opacity .35s;pointer-events:none}
  .screen.hidden{opacity:0}
  .hidden-hard{display:none!important}
  /* ---- menu ---- */
  #menu .logo{font-size:64px;filter:drop-shadow(0 6px 18px rgba(0,0,0,.5));animation:bob 2.4s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  #menu h1{font-size:54px;font-weight:900;letter-spacing:2px;margin:6px 0 2px;
    background:linear-gradient(180deg,#fff,#9ecbff);-webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 10px 30px rgba(80,140,255,.25)}
  #menu .en{font-size:13px;letter-spacing:7px;color:#7e93c4;font-weight:700;margin-bottom:18px}
  #menu .sub{font-size:15px;line-height:1.6;color:#c3d2f0}
  #challenge{margin-top:16px;padding:10px 18px;border-radius:999px;font-size:14px;font-weight:700;
    background:linear-gradient(90deg,#ff5d3b,#ff9d2e);box-shadow:0 6px 20px rgba(255,199,46,.3);
    animation:pulse 1.6s ease-in-out infinite}
  #menuBestWrap{margin-top:14px;font-size:14px;color:#ffd76b;font-weight:700}
  #menu .tap{margin-top:34px;font-size:17px;font-weight:800;color:#fff;animation:pulse 1.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.65;transform:scale(.97)}}
  /* ---- hud ---- */
  #hud{position:fixed;top:0;left:0;right:0;z-index:5;pointer-events:none;
    padding:calc(14px + env(safe-area-inset-top)) 18px 0;transition:opacity .3s}
  #hud.hidden{opacity:0}
  #floors{text-align:center;font-size:64px;font-weight:900;line-height:1;
    text-shadow:0 4px 24px rgba(120,180,255,.45)}
  #hudBest{position:absolute;top:calc(16px + env(safe-area-inset-top));left:16px;
    font-size:13px;font-weight:700;color:#ffd76b;opacity:.9}
  /* ---- game over ---- */
  #over{background:rgba(8,11,28,.45);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
  #over .panel{pointer-events:auto;width:min(320px,84vw);padding:30px 26px 24px;border-radius:24px;
    background:rgba(20,26,54,.92);border:1px solid rgba(140,170,255,.22);
    box-shadow:0 24px 60px rgba(0,0,0,.55);transform:translateY(8px);transition:transform .35s}
  #over:not(.hidden) .panel{transform:translateY(0)}
  #newrec{display:inline-block;margin-bottom:10px;padding:6px 14px;border-radius:999px;font-size:14px;font-weight:800;
    background:linear-gradient(90deg,#ffce3a,#ff8a3d);color:#3a2200;animation:pulse 1.2s infinite}
  #beat{display:inline-block;margin-bottom:10px;padding:6px 14px;border-radius:999px;font-size:14px;font-weight:800;
    background:linear-gradient(90deg,#41e3a5,#2bb8ff);color:#02321f}
  .score-label{font-size:13px;color:#8fa3cf;font-weight:700;letter-spacing:2px}
  #finalScore{font-size:58px;font-weight:900;margin:2px 0 6px;
    background:linear-gradient(180deg,#fff,#a9d2ff);-webkit-background-clip:text;background-clip:text;color:transparent}
  #overBest{font-size:14px;color:#ffd76b;font-weight:700;margin-bottom:20px}
  button{display:block;width:100%;border:0;cursor:pointer;border-radius:16px;padding:15px 12px;margin-top:10px;
    font-size:16px;font-weight:800;font-family:inherit;color:#fff;touch-action:manipulation;
    transition:transform .08s,filter .15s}
  button:active{transform:scale(.96);filter:brightness(1.15)}
  #btnShare{background:linear-gradient(90deg,#ff7a3d,#ff4d6d);box-shadow:0 10px 24px rgba(255,90,90,.35)}
  #btnRetry{background:linear-gradient(90deg,#3d7bff,#2bb8ff);box-shadow:0 10px 24px rgba(60,130,255,.35)}
  /* ---- toast ---- */
  #toast{position:fixed;left:50%;bottom:calc(36px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);
    z-index:50;padding:12px 20px;border-radius:999px;font-size:14px;font-weight:700;white-space:nowrap;
    background:rgba(255,255,255,.94);color:#1a2342;box-shadow:0 10px 30px rgba(0,0,0,.4);
    opacity:0;transition:all .3s;pointer-events:none}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud" class="hidden">
  <div id="floors">0</div>
  <div id="hudBest"></div>
</div>

<div id="menu" class="screen">
  <div class="logo">🏯</div>
  <h1>하늘탑</h1>
  <div class="en">SKY TOWER</div>
  <div class="sub">타이밍 맞춰 탭! 블록을 쌓아<br>하늘 끝까지 올라가 보자</div>
  <div id="challenge" class="hidden-hard"></div>
  <div id="menuBestWrap" class="hidden-hard">🏆 내 최고 기록 <span id="menuBest">0</span>층</div>
  <div class="tap">👆 화면을 탭해서 시작</div>
</div>

<div id="over" class="screen hidden">
  <div class="panel">
    <div id="newrec" class="hidden-hard">🎉 신기록!</div>
    <div id="beat" class="hidden-hard">😎 친구 기록 격파!</div>
    <div class="score-label">이번 기록</div>
    <div id="finalScore">0층</div>
    <div id="overBest"></div>
    <button id="btnShare">📨 친구에게 도전장 보내기</button>
    <button id="btnRetry">🔄 다시 쌓기</button>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';
/* ================= setup ================= */
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
let W = 0, H = 0, DPR = 1;
function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = Math.round(W * DPR); cv.height = Math.round(H * DPR);
  cv.style.width = W + 'px'; cv.style.height = H + 'px';
  if (state === 'play') camYT = -floors * B - H * 0.62;
}
window.addEventListener('resize', resize);

const $ = id => document.getElementById(id);
const B = 34;            // block height
const PERF = 8;          // perfect drop tolerance (px)
const GROW = 7;          // width regained per perfect
const baseW = () => Math.min(300, W * 0.72);

/* ================= state ================= */
let state = 'menu';      // menu | play | dying | over
let stack = [], cur = null, debris = [], parts = [], floats = [], confettis = [];
let floors = 0, combo = 0, best = 0, newRec = false, beatChall = false, flash = 0;
let camY = 0, camYT = 0, zoom = 1, zoomT = 1, shake = 0;
try { best = +localStorage.getItem('skytower_best') || 0; } catch(e) {}

const challenge = Math.max(0, parseInt(new URLSearchParams(location.search).get('s'), 10) || 0);

const stars = [];
for (let i = 0; i < 70; i++)
  stars.push({ x: Math.random(), y: Math.random(), r: Math.random() * 1.5 + 0.5, a: Math.random() * 0.5 + 0.15 });

/* ================= audio ================= */
let AC = null;
function ac(){
  try {
    if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
    if (AC.state === 'suspended') AC.resume();
    return AC;
  } catch(e){ return null; }
}
function tone(f, d, type, vol, f2){
  const a = ac(); if (!a) return;
  const o = a.createOscillator(), g = a.createGain(), t = a.currentTime;
  o.type = type; o.frequency.setValueAtTime(f, t);
  if (f2) o.frequency.exponentialRampToValueAtTime(f2, t + d);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + d);
  o.connect(g); g.connect(a.destination);
  o.start(t); o.stop(t + d + 0.02);
}
const sPlace   = () => { tone(190, 0.07, 'square', 0.10); tone(120, 0.09, 'sawtooth', 0.06); };
const sPerfect = c  => { const f = 523 * Math.pow(1.0595, Math.min(c, 14));
                         tone(f, 0.09, 'sine', 0.22); setTimeout(() => tone(f * 1.26, 0.12, 'sine', 0.18), 55); };
const sOver    = () => tone(300, 0.55, 'sawtooth', 0.16, 80);
const sFanfare = () => [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => tone(f, 0.16, 'triangle', 0.2), i * 95));

/* ================= helpers ================= */
function setBestUI(){
  $('hudBest').textContent = best > 0 ? '🏆 ' + best + '층' : '';
  $('menuBest').textContent = best;
  $('menuBestWrap').classList.toggle('hidden-hard', best <= 0);
}
function floatTxt(x, y, txt, col, size){
  floats.push({ x, y, txt, col, size: size || 17, t: 1, vy: -0.9 });
}
function ring(x, y, hue){
  parts.push({ ring: true, x, y, r: 6, vr: 2.6, t: 1, hue });
}
function chips(x, y, hue, n){
  for (let i = 0; i < (n || 7); i++)
    parts.push({ x, y: y + Math.random() * B, vx: (Math.random() - 0.5) * 5,
                 vy: -Math.random() * 3 - 1, s: Math.random() * 5 + 2, t: 1, hue });
}
function confetti(){
  for (let i = 0; i < 90; i++)
    confettis.push({ x: Math.random() * W, y: -20 - Math.random() * H * 0.4,
                     vx: (Math.random() - 0.5) * 2.2, vy: Math.random() * 2.5 + 2,
                     s: Math.random() * 6 + 3, hue: Math.random() * 360,
                     rot: Math.random() * 6.28, vr: (Math.random() - 0.5) * 0.25 });
}
let toastT = null;
function toast(m){
  const t = $('toast'); t.textContent = m; t.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(() => t.classList.remove('show'), 2400);
}

/* ================= game flow ================= */
function reset(){
  stack = [{ x: W / 2, y: 0, w: baseW(), hue: 205, land: 0 }];
  debris = []; parts = []; floats = []; confettis = [];
  floors = 0; combo = 0; newRec = false; beatChall = false;
  camYT = -H * 0.62; camY = camYT; zoom = 1; zoomT = 1; shake = 0;
  $('floors').textContent = '0';
}
function spawn(){
  const L = stack.length, top = stack[L - 1];
  const range = baseW() / 2 + Math.min(W * 0.2, 110);
  const spd = Math.min(2.4 + floors * 0.055, 7) * (W < 420 ? 0.95 : 1);
  cur = { x: W / 2 + (L % 2 ? range : -range), y: -L * B, w: top.w,
          dir: L % 2 ? -1 : 1, spd, range, hue: (205 + L * 6) % 360 };
}
function start(){
  ac();
  reset(); spawn(); state = 'play';
  $('menu').classList.add('hidden');
  $('over').classList.add('hidden');
  $('hud').classList.remove('hidden');
  setBestUI();
}
function drop(){
  if (!cur) return;
  const top = stack[stack.length - 1];
  const dx = cur.x - top.x;
  const L = Math.max(cur.x - cur.w / 2, top.x - top.w / 2);
  const R = Math.min(cur.x + cur.w / 2, top.x + top.w / 2);
  const ov = R - L;

  if (ov <= 0){ // complete miss → game over
    debris.push({ x: cur.x, y: cur.y, w: cur.w, vy: -1.5, rot: 0,
                  vr: (dx > 0 ? 1 : -1) * 0.05, hue: cur.hue });
    cur = null;
    die();
    return;
  }

  if (Math.abs(dx) <= PERF){ // perfect!
    combo++;
    cur.x = top.x;
    cur.w = Math.min(cur.w + GROW, baseW());
    ring(cur.x, cur.y + B / 2, cur.hue);
    floatTxt(cur.x, cur.y - 12, combo > 1 ? 'PERFECT x' + combo + '!' : 'PERFECT!', '#ffe177', 18 + Math.min(combo * 1.5, 10));
    flash = 0.5;
    sPerfect(combo);
  } else {
    combo = 0;
    const pw = cur.w - ov;
    const px = dx > 0 ? R + pw / 2 : L - pw / 2;
    debris.push({ x: px, y: cur.y, w: pw, vy: -1.2, rot: 0,
                  vr: (dx > 0 ? 1 : -1) * 0.06, hue: cur.hue });
    chips(dx > 0 ? R : L, cur.y, cur.hue);
    cur.x = (L + R) / 2; cur.w = ov;
    shake = Math.max(shake, 3);
    sPlace();
  }

  stack.push({ x: cur.x, y: cur.y, w: cur.w, hue: cur.hue, land: 1 });
  floors = stack.length - 1;
  $('floors').textContent = floors;

  if (challenge > 0 && !beatChall && floors > challenge){
    beatChall = true;
    floatTxt(cur.x, cur.y - 40, '친구 기록 돌파!! 🔥', '#7dffc4', 22);
    confetti(); sFanfare();
  } else if (floors % 10 === 0){
    floatTxt(cur.x, cur.y - 36, floors + '층 돌파! 🚀', '#7df0ff', 19);
  }

  camYT = -floors * B - H * 0.62;
  spawn();
}
function die(){
  state = 'dying'; shake = 12; sOver();
  if (floors > best){
    best = floors; newRec = true;
    try { localStorage.setItem('skytower_best', best); } catch(e) {}
  }
  setTimeout(showOver, 800);
}
function showOver(){
  state = 'over';
  const towerH = (floors + 1) * B;
  zoomT = Math.min(1, (H * 0.72) / towerH);
  camYT = -H * 0.86;
  $('finalScore').textContent = floors + '층';
  $('overBest').textContent = '🏆 최고 기록 ' + best + '층';
  $('newrec').classList.toggle('hidden-hard', !newRec);
  $('beat').classList.toggle('hidden-hard', !(beatChall && !newRec));
  $('hud').classList.add('hidden');
  $('over').classList.remove('hidden');
  setBestUI();
  if (newRec){ confetti(); sFanfare(); }
}

/* ================= share ================= */
function shareTxt(){
  if (challenge > 0 && floors > challenge)
    return '🏯 하늘탑 ' + challenge + '층 도전장? 내가 ' + floors + '층으로 깼다 ㅋㅋ 복수해봐';
  return '🏯 하늘탑 ' + floors + '층 달성! 너 이거 깰 수 있어?';
}
function shareUrl(){
  return location.origin + location.pathname + (floors > 0 ? '?s=' + floors : '');
}
function share(){
  const txt = shareTxt(), url = shareUrl();
  if (navigator.share){
    navigator.share({ title: '하늘탑 🏯', text: txt, url }).catch(() => {});
  } else if (navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt + '\n' + url)
      .then(() => toast('복사 완료! 채팅방에 붙여넣어 보내 📋'), () => fallbackCopy(txt + '\n' + url));
  } else fallbackCopy(txt + '\n' + url);
}
function fallbackCopy(t){
  const ta = document.createElement('textarea');
  ta.value = t; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); toast('복사 완료! 채팅방에 붙여넣어 보내 📋'); }
  catch(e){ toast('주소창의 링크를 복사해서 보내줘!'); }
  ta.remove();
}

/* ================= input ================= */
function tap(){
  if (state === 'menu') start();
  else if (state === 'play') drop();
}
window.addEventListener('pointerdown', e => {
  if (e.target.closest('button')) return;
  tap();
});
window.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter'){ e.preventDefault(); tap(); }
});
window.addEventListener('contextmenu', e => e.preventDefault());
$('btnRetry').addEventListener('click', start);
$('btnShare').addEventListener('click', share);

/* ================= update & render ================= */
function lerpK(k, dt){ return 1 - Math.pow(1 - k, dt); }

function update(dt){
  camY += (camYT - camY) * lerpK(0.12, dt);
  zoom += (zoomT - zoom) * lerpK(0.09, dt);
  shake *= Math.pow(0.86, dt);
  flash *= Math.pow(0.85, dt);

  if (state === 'play' && cur){
    cur.x += cur.dir * cur.spd * dt;
    if (cur.x < W / 2 - cur.range){ cur.x = W / 2 - cur.range; cur.dir = 1; }
    if (cur.x > W / 2 + cur.range){ cur.x = W / 2 + cur.range; cur.dir = -1; }
  }
  for (const b of stack) if (b.land > 0) b.land = Math.max(0, b.land - 0.12 * dt);

  for (let i = debris.length - 1; i >= 0; i--){
    const d = debris[i];
    d.vy += 0.55 * dt; d.y += d.vy * dt; d.rot += d.vr * dt;
    if (d.y - camY > H / Math.min(zoom, 1) + 400) debris.splice(i, 1);
  }
  for (let i = parts.length - 1; i >= 0; i--){
    const p = parts[i];
    if (p.ring){ p.r += p.vr * dt; p.t -= 0.045 * dt; }
    else { p.vy += 0.3 * dt; p.x += p.vx * dt; p.y += p.vy * dt; p.t -= 0.03 * dt; }
    if (p.t <= 0) parts.splice(i, 1);
  }
  for (let i = floats.length - 1; i >= 0; i--){
    const f = floats[i];
    f.y += f.vy * dt; f.t -= 0.016 * dt;
    if (f.t <= 0) floats.splice(i, 1);
  }
  for (let i = confettis.length - 1; i >= 0; i--){
    const c = confettis[i];
    c.x += c.vx * dt; c.y += c.vy * dt; c.rot += c.vr * dt;
    if (c.y > H + 30) confettis.splice(i, 1);
  }
}

function drawBlock(x, y, w, hue, glow, land){
  const sy = land ? 1 - 0.16 * land : 1;
  const h = B * sy, yy = y + B - h;
  const g = ctx.createLinearGradient(0, yy, 0, yy + h);
  g.addColorStop(0, 'hsl(' + hue + ',64%,60%)');
  g.addColorStop(1, 'hsl(' + hue + ',60%,44%)');
  ctx.fillStyle = g;
  if (glow){ ctx.shadowColor = 'hsla(' + hue + ',85%,65%,.85)'; ctx.shadowBlur = 16; }
  ctx.fillRect(x - w / 2, yy, w, h);
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,.25)';
  ctx.fillRect(x - w / 2, yy, w, 2.5);
  ctx.fillStyle = 'rgba(0,0,0,.2)';
  ctx.fillRect(x - w / 2, yy + h - 2.5, w, 2.5);
}

function drawTargetLine(n, col, label){
  if (n <= 0) return;
  const y = -n * B - camY;
  const eff = (y - H * 0.88) * zoom + H * 0.88;
  if (eff < -30 || eff > H + 30) return;
  ctx.save();
  ctx.strokeStyle = col; ctx.globalAlpha = 0.55; ctx.lineWidth = 1.5;
  ctx.setLineDash([7, 7]);
  ctx.beginPath(); ctx.moveTo(14, y); ctx.lineTo(W - 14, y); ctx.stroke();
  ctx.setLineDash([]);
  ctx.globalAlpha = 0.9; ctx.fillStyle = col;
  ctx.font = '700 12px sans-serif'; ctx.textAlign = 'right';
  ctx.fillText(label + ' ' + n + '층', W - 16, y - 6);
  ctx.restore();
}

function render(){
  // sky
  const bh = (224 + floors * 1.5) % 360;
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, 'hsl(' + (bh + 26) % 360 + ',55%,6%)');
  g.addColorStop(1, 'hsl(' + bh + ',52%,17%)');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  // stars (parallax)
  ctx.fillStyle = '#fff';
  const off = -camY * 0.3, span = H + 80;
  for (const s of stars){
    const sy = ((s.y * span + off) % span + span) % span - 40;
    ctx.globalAlpha = s.a;
    ctx.beginPath(); ctx.arc(s.x * W, sy, s.r, 0, 6.283); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // world (camera + shake + game-over zoom)
  ctx.save();
  ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
  ctx.translate(W / 2, H * 0.88); ctx.scale(zoom, zoom); ctx.translate(-W / 2, -H * 0.88);

  for (let i = 0; i < stack.length; i++){
    const b = stack[i], y = b.y - camY;
    if (i > 0 && zoom === 1 && (y > H + B || y < -2 * B)) continue;
    if (i === 0){ // foundation column
      const gg = ctx.createLinearGradient(0, y, 0, y + 600);
      gg.addColorStop(0, 'hsl(205,55%,42%)'); gg.addColorStop(1, 'hsl(225,55%,12%)');
      ctx.fillStyle = gg;
      ctx.fillRect(b.x - b.w / 2, y, b.w, 4000);
      ctx.fillStyle = 'rgba(255,255,255,.25)';
      ctx.fillRect(b.x - b.w / 2, y, b.w, 2.5);
      continue;
    }
    drawBlock(b.x, y, b.w, b.hue, false, b.land);
  }

  drawTargetLine(challenge, '#ffa94d', '🔥 친구');
  if (best > 0 && best !== challenge) drawTargetLine(best, '#6be0ff', '🏆 내 최고');

  for (const d of debris){
    ctx.save();
    ctx.translate(d.x, d.y - camY + B / 2); ctx.rotate(d.rot);
    drawBlock(0, -B / 2, d.w, d.hue, false, 0);
    ctx.restore();
  }

  if (state === 'play' && cur) drawBlock(cur.x, cur.y - camY, cur.w, cur.hue, true, 0);

  for (const p of parts){
    if (p.ring){
      ctx.globalAlpha = Math.max(0, p.t);
      ctx.strokeStyle = 'hsl(' + p.hue + ',90%,72%)'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(p.x, p.y - camY, p.r, 0, 6.283); ctx.stroke();
    } else {
      ctx.globalAlpha = Math.max(0, p.t);
      ctx.fillStyle = 'hsl(' + p.hue + ',75%,62%)';
      ctx.fillRect(p.x - p.s / 2, p.y - camY - p.s / 2, p.s, p.s);
    }
  }
  ctx.globalAlpha = 1;

  ctx.font = '800 17px sans-serif'; ctx.textAlign = 'center';
  for (const f of floats){
    ctx.globalAlpha = Math.max(0, Math.min(1, f.t * 1.4));
    ctx.font = '800 ' + f.size + 'px sans-serif';
    ctx.fillStyle = f.col;
    ctx.shadowColor = 'rgba(0,0,0,.45)'; ctx.shadowBlur = 6;
    ctx.fillText(f.txt, f.x, f.y - camY);
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;

  if (state === 'play' && floors === 0 && cur){
    ctx.globalAlpha = 0.85; ctx.fillStyle = '#cfe0ff';
    ctx.font = '700 15px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('타이밍 맞춰 탭! 👆', W / 2, cur.y - camY - 22);
    ctx.globalAlpha = 1;
  }
  ctx.restore();

  // screen-space confetti
  for (const c of confettis){
    ctx.save();
    ctx.translate(c.x, c.y); ctx.rotate(c.rot);
    ctx.fillStyle = 'hsl(' + c.hue + ',85%,62%)';
    ctx.fillRect(-c.s / 2, -c.s / 2, c.s, c.s * 0.6);
    ctx.restore();
  }

  if (flash > 0.02){
    ctx.globalAlpha = flash * 0.25;
    ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }
}

let last = performance.now();
function frame(now){
  const dt = Math.min(2.5, Math.max(0.25, (now - last) / 16.667));
  last = now;
  update(dt);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  render();
  requestAnimationFrame(frame);
}

/* ================= init ================= */
resize();
reset();
setBestUI();
if (challenge > 0){
  const c = $('challenge');
  c.textContent = '🔥 친구가 ' + challenge + '층 도전장을 보냈어!';
  c.classList.remove('hidden-hard');
}
requestAnimationFrame(frame);

/* test hook (tiny, harmless) */
window.__sky = {
  tap,
  state: () => state,
  floors: () => floors,
  align(){ if (cur) cur.x = stack[stack.length - 1].x; },
  miss(){ if (cur) cur.x = stack[stack.length - 1].x + stack[stack.length - 1].w + cur.w; }
};
</script>
</body>
