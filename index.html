<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>하늘탑 🏯 몇 층까지 쌓을 수 있어?</title>
<meta name="description" content="한 손가락 탭으로 블록을 쌓아 하늘 끝까지! 친구와 최고 기록 대결.">
<meta property="og:title" content="하늘탑 🏯 몇 층까지 쌓을 수 있어?">
<meta property="og:description" content="한 손가락 탭으로 블록을 쌓아 하늘 끝까지! 지금 바로 도전 👆">
<meta property="og:type" content="website">
<meta property="og:image" content="https://serijawow.github.io/sky-tower/og.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="theme-color" content="#0b1026">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏯</text></svg>">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:#0b1026;
    touch-action:none;overscroll-behavior:none;
    user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;
    font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic','Segoe UI',sans-serif;color:#fff}
  canvas{display:block;position:fixed;inset:0}
  .screen{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;
    transition:opacity .35s,visibility .35s;pointer-events:none}
  .screen.hidden{opacity:0;visibility:hidden} /* visibility blocks hit-testing on children too */
  .hidden-hard{display:none!important}
  /* ---- menu ---- */
  #menu .logo{font-size:64px;filter:drop-shadow(0 6px 18px rgba(0,0,0,.5));animation:bob 2.4s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  #menu h1{font-size:54px;font-weight:900;letter-spacing:2px;margin:6px 0 2px;
    background:linear-gradient(180deg,#fff,#9ecbff);-webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 10px 30px rgba(80,140,255,.25)}
  #menu .en{font-size:13px;letter-spacing:7px;color:#7e93c4;font-weight:700;margin-bottom:18px}
  #menu .sub{font-size:15px;line-height:1.6;color:#c3d2f0}
  #challenge{margin-top:16px;padding:10px 18px;border-radius:999px;font-size:14px;font-weight:700;
    background:linear-gradient(90deg,#ff5d3b,#ff9d2e);box-shadow:0 6px 20px rgba(255,199,46,.3);
    animation:pulse 1.6s ease-in-out infinite}
  #menuBestWrap{margin-top:14px;font-size:14px;color:#ffd76b;font-weight:700}
  #menu .tap{margin-top:34px;font-size:17px;font-weight:800;color:#fff;animation:pulse 1.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.65;transform:scale(.97)}}
  /* ---- hud ---- */
  #hud{position:fixed;top:0;left:0;right:0;z-index:5;pointer-events:none;
    padding:calc(14px + env(safe-area-inset-top)) 18px 0;transition:opacity .3s}
  #hud.hidden{opacity:0}
  #combo{text-align:center;font-size:16px;font-weight:800;color:#ffd76b;margin-top:2px;
    text-shadow:0 2px 12px rgba(255,160,60,.65);animation:pulse .9s infinite}
  #finalZone{font-size:13px;color:#9fb4e8;font-weight:700;margin-bottom:2px}
  .hint{margin-top:12px;font-size:12px;color:#6f7fa8}
  #mute{position:fixed;top:calc(12px + env(safe-area-inset-top));right:14px;z-index:30;
    font-size:22px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;
    background:rgba(20,26,54,.55);border:1px solid rgba(140,170,255,.25);border-radius:50%;
    cursor:pointer;user-select:none}
  #floors{text-align:center;font-size:64px;font-weight:900;line-height:1;
    text-shadow:0 4px 24px rgba(120,180,255,.45)}
  #hudBest{position:absolute;top:calc(16px + env(safe-area-inset-top));left:16px;
    font-size:13px;font-weight:700;color:#ffd76b;opacity:.9}
  /* ---- game over ---- */
  #over{background:rgba(8,11,28,.45);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
  #over .panel{pointer-events:auto;width:min(320px,84vw);padding:30px 26px 24px;border-radius:24px;
    background:rgba(20,26,54,.92);border:1px solid rgba(140,170,255,.22);
    box-shadow:0 24px 60px rgba(0,0,0,.55);transform:translateY(8px);transition:transform .35s}
  #over:not(.hidden) .panel{transform:translateY(0)}
  #newrec{display:inline-block;margin-bottom:10px;padding:6px 14px;border-radius:999px;font-size:14px;font-weight:800;
    background:linear-gradient(90deg,#ffce3a,#ff8a3d);color:#3a2200;animation:pulse 1.2s infinite}
  #beat{display:inline-block;margin-bottom:10px;padding:6px 14px;border-radius:999px;font-size:14px;font-weight:800;
    background:linear-gradient(90deg,#41e3a5,#2bb8ff);color:#02321f}
  .score-label{font-size:13px;color:#8fa3cf;font-weight:700;letter-spacing:2px}
  #finalScore{font-size:58px;font-weight:900;margin:2px 0 6px;
    background:linear-gradient(180deg,#fff,#a9d2ff);-webkit-background-clip:text;background-clip:text;color:transparent}
  #overBest{font-size:14px;color:#ffd76b;font-weight:700;margin-bottom:20px}
  button{display:block;width:100%;border:0;cursor:pointer;border-radius:16px;padding:15px 12px;margin-top:10px;
    font-size:16px;font-weight:800;font-family:inherit;color:#fff;touch-action:manipulation;
    transition:transform .08s,filter .15s}
  button:active{transform:scale(.96);filter:brightness(1.15)}
  #btnShare{background:linear-gradient(90deg,#ff7a3d,#ff4d6d);box-shadow:0 10px 24px rgba(255,90,90,.35)}
  #btnRetry{background:linear-gradient(90deg,#3d7bff,#2bb8ff);box-shadow:0 10px 24px rgba(60,130,255,.35)}
  /* ---- toast ---- */
  #toast{position:fixed;left:50%;bottom:calc(36px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);
    z-index:50;padding:12px 20px;border-radius:999px;font-size:14px;font-weight:700;white-space:nowrap;
    background:rgba(255,255,255,.94);color:#1a2342;box-shadow:0 10px 30px rgba(0,0,0,.4);
    opacity:0;transition:all .3s;pointer-events:none}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud" class="hidden">
  <div id="floors">0</div>
  <div id="combo" class="hidden-hard"></div>
  <div id="hudBest"></div>
</div>

<div id="menu" class="screen">
  <div class="logo">🏯</div>
  <h1>하늘탑</h1>
  <div class="en">SKY TOWER</div>
  <div class="sub">타이밍 맞춰 탭! 퍼펙트 3연속이면<br>🔥피버 — 2층짜리 블록으로 2배 상승!<br>💣 폭탄이 지나갈 땐 절대 누르지 말 것</div>
  <div id="challenge" class="hidden-hard"></div>
  <div id="menuBestWrap" class="hidden-hard">🏆 내 최고 기록 <span id="menuBest">0</span>층</div>
  <div class="tap">👆 화면을 탭해서 시작</div>
</div>

<div id="over" class="screen hidden">
  <div class="panel">
    <div id="newrec" class="hidden-hard">🎉 신기록!</div>
    <div id="beat" class="hidden-hard">😎 친구 기록 격파!</div>
    <div class="score-label">이번 기록</div>
    <div id="finalScore">0층</div>
    <div id="finalZone"></div>
    <div id="overBest"></div>
    <button id="btnShare">📨 친구에게 도전장 보내기</button>
    <button id="btnRetry">🔄 다시 쌓기</button>
    <div class="hint">패널 바깥을 탭해도 바로 다시 시작!</div>
  </div>
</div>

<div id="toast"></div>
<div id="mute">🔊</div>

<script>
'use strict';
/* ================= setup ================= */
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
let W = 0, H = 0, DPR = 1;
function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = Math.round(W * DPR); cv.height = Math.round(H * DPR);
  cv.style.width = W + 'px'; cv.style.height = H + 'px';
  if (state === 'play') camYT = stack[stack.length - 1].y - H * 0.62;
}
window.addEventListener('resize', resize);

const $ = id => document.getElementById(id);
const B = 34;            // block height
const PERF = 8;          // perfect drop tolerance (px)
const GROW = 7;          // width regained per perfect
const baseW = () => Math.min(300, W * 0.72);
const ZONES = [
  { at: 0,  name: '',              h: 224, s: 52, l: 17 },
  { at: 15, name: '노을 지대 🌅',   h: 358, s: 60, l: 22 },
  { at: 30, name: '오로라 지대 🌌', h: 158, s: 55, l: 18 },
  { at: 45, name: '우주 지대 🪐',   h: 268, s: 55, l: 14 },
  { at: 65, name: '별의 바다 ✨',   h: 200, s: 65, l: 20 },
  { at: 90, name: '신들의 영역 ⚡', h: 45,  s: 60, l: 18 }
];
function zoneIdxOf(f){ let z = 0; for (let i = 0; i < ZONES.length; i++) if (f >= ZONES[i].at) z = i; return z; }
function lerpHue(a, b, k){ const d = ((b - a + 540) % 360) - 180; return (a + d * k + 360) % 360; }

/* ================= state ================= */
let state = 'menu';      // menu | play | dying | over
let stack = [], cur = null, debris = [], parts = [], floats = [], confettis = [];
let floors = 0, combo = 0, best = 0, newRec = false, beatChall = false, flash = 0;
let camY = 0, camYT = 0, zoom = 1, zoomT = 1, shake = 0;
let bgH = 224, bgS = 52, bgL = 17, curZone = 0, timeScale = 1, overAt = 0, tick = 0;
let nextBombAt = 8, nextCatAt = 12;
try { best = +localStorage.getItem('skytower_best') || 0; } catch(e) {}

const challenge = Math.max(0, parseInt(new URLSearchParams(location.search).get('s'), 10) || 0);

const stars = [];
for (let i = 0; i < 70; i++)
  stars.push({ x: Math.random(), y: Math.random(), r: Math.random() * 1.5 + 0.5,
               a: Math.random() * 0.5 + 0.15, tw: Math.random() * 3 + 1 });

/* ================= audio ================= */
let AC = null;
function ac(){
  try {
    if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
    if (AC.state === 'suspended') AC.resume();
    return AC;
  } catch(e){ return null; }
}
function tone(f, d, type, vol, f2){
  if (muted) return;
  const a = ac(); if (!a) return;
  const o = a.createOscillator(), g = a.createGain(), t = a.currentTime;
  o.type = type; o.frequency.setValueAtTime(f, t);
  if (f2) o.frequency.exponentialRampToValueAtTime(f2, t + d);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + d);
  o.connect(g); g.connect(a.destination);
  o.start(t); o.stop(t + d + 0.02);
}
const sPlace   = () => { tone(190, 0.07, 'square', 0.10); tone(120, 0.09, 'sawtooth', 0.06); };
const sPerfect = c  => { const f = 523 * Math.pow(1.0595, Math.min(c, 14));
                         tone(f, 0.09, 'sine', 0.22); setTimeout(() => tone(f * 1.26, 0.12, 'sine', 0.18), 55); };
const sOver    = () => tone(300, 0.55, 'sawtooth', 0.16, 80);
const sFanfare = () => [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => tone(f, 0.16, 'triangle', 0.2), i * 95));
const sGold    = () => { tone(988, 0.07, 'square', 0.16); setTimeout(() => tone(1319, 0.12, 'square', 0.14), 70); };
const sBoom    = () => { tone(90, 0.45, 'sawtooth', 0.4, 30); tone(420, 0.16, 'square', 0.22, 55); };
function sMeow(){ // the one true alpha meow: formant-filtered voice (ee->ah->oo)
  if (muted) return; const a = ac(); if (!a) return;
  const t = a.currentTime;
  const dur = 0.57, base = 240, vol = 0.62;

  // voice: saw carrier -> bandpass formant -> amp
  const o = a.createOscillator(); o.type = 'sawtooth';
  const f = a.createBiquadFilter(); f.type = 'bandpass'; f.Q.value = 4;
  const g = a.createGain();
  o.frequency.setValueAtTime(base, t);
  o.frequency.exponentialRampToValueAtTime(base * 1.7, t + 0.10); // me-
  o.frequency.setValueAtTime(base * 1.7, t + 0.14);
  o.frequency.exponentialRampToValueAtTime(base * 0.7, t + dur);  // -ow
  f.frequency.setValueAtTime(900, t);                       // 'ee'
  f.frequency.exponentialRampToValueAtTime(2200, t + 0.12); // 'ah'
  f.frequency.exponentialRampToValueAtTime(500, t + dur);   // 'oo'
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol, t + 0.05);
  g.gain.setValueAtTime(vol, t + dur * 0.55);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  // vibrato makes it vocal instead of mechanical
  const v = a.createOscillator(); v.frequency.value = 6.5;
  const vg = a.createGain(); vg.gain.value = base * 0.04;
  v.connect(vg); vg.connect(o.frequency);
  o.connect(f); f.connect(g); g.connect(a.destination);
  o.start(t); o.stop(t + dur + 0.05); v.start(t); v.stop(t + dur + 0.05);

  // sub layer for chest/body
  const o2 = a.createOscillator(); o2.type = 'sine';
  const g2 = a.createGain();
  o2.frequency.setValueAtTime(base * 0.5, t);
  o2.frequency.exponentialRampToValueAtTime(base * 0.85, t + 0.10);
  o2.frequency.exponentialRampToValueAtTime(base * 0.35, t + dur);
  g2.gain.setValueAtTime(0.0001, t);
  g2.gain.exponentialRampToValueAtTime(vol * 0.3, t + 0.06);
  g2.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o2.connect(g2); g2.connect(a.destination); o2.start(t); o2.stop(t + dur + 0.05);
}
const sFever   = () => [440, 587, 880].forEach((f, i) => setTimeout(() => tone(f, 0.1, 'sawtooth', 0.14), i * 70));
function firework(x, y, n){
  for (let i = 0; i < n; i++){
    const a = Math.random() * 6.283, v = Math.random() * 4 + 1.5;
    parts.push({ x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v - 1,
                 s: Math.random() * 4 + 2, t: 1, hue: Math.random() * 360 });
  }
}

/* ================= bgm (procedural chiptune) ================= */
let muted = false; try { muted = localStorage.getItem('skytower_mute') === '1'; } catch(e) {}
let bgmOn = false, bgmTimer = null, bgmNext = 0, bgmStep = 0;
const BASS = [110, 0, 110, 0, 82.41, 0, 98, 0, 110, 0, 110, 0, 130.81, 0, 98, 0];
const LEAD = [440, 523.25, 659.25, 880, 0, 659.25, 523.25, 0, 440, 523.25, 659.25, 783.99, 880, 0, 1046.5, 0];
function note(f, t, d, type, vol){
  const a = ac(); if (!a) return;
  const o = a.createOscillator(), g = a.createGain();
  o.type = type; o.frequency.setValueAtTime(f, t);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + d);
  o.connect(g); g.connect(a.destination); o.start(t); o.stop(t + d + 0.02);
}
function bgmTick(){
  const a = ac(); if (!a || !bgmOn) return;
  const fever = combo >= 3, spb = fever ? 0.10 : 0.13; // step length: fever speeds music up
  if (bgmNext < a.currentTime) bgmNext = a.currentTime + 0.02;
  while (bgmNext < a.currentTime + 0.18){
    const i = bgmStep % 16;
    if (!muted){
      if (BASS[i]) note(BASS[i], bgmNext, spb * 0.9, 'square', 0.085);
      if (LEAD[i]) note(LEAD[i] * (fever ? 2 : 1), bgmNext, spb * 0.85, 'triangle', fever ? 0.11 : 0.08);
    }
    bgmNext += spb; bgmStep++;
  }
}
function bgmStart(){ const a = ac(); if (!a) return; bgmOn = true; bgmNext = a.currentTime + 0.05; bgmStep = 0; if (!bgmTimer) bgmTimer = setInterval(bgmTick, 40); }
function bgmStop(){ bgmOn = false; if (bgmTimer){ clearInterval(bgmTimer); bgmTimer = null; } }
document.addEventListener('visibilitychange', () => {
  if (!AC) return;
  if (document.hidden) AC.suspend(); else if (state === 'play') AC.resume();
});

/* ================= helpers ================= */
function setBestUI(){
  $('hudBest').textContent = best > 0 ? '🏆 ' + best + '층' : '';
  $('menuBest').textContent = best;
  $('menuBestWrap').classList.toggle('hidden-hard', best <= 0);
}
function floatTxt(x, y, txt, col, size){
  floats.push({ x, y, txt, col, size: size || 17, t: 1, vy: -0.9 });
}
function ring(x, y, hue){
  parts.push({ ring: true, x, y, r: 6, vr: 2.6, t: 1, hue });
}
function chips(x, y, hue, n){
  for (let i = 0; i < (n || 7); i++)
    parts.push({ x, y: y + Math.random() * B, vx: (Math.random() - 0.5) * 5,
                 vy: -Math.random() * 3 - 1, s: Math.random() * 5 + 2, t: 1, hue });
}
function confetti(){
  for (let i = 0; i < 90; i++)
    confettis.push({ x: Math.random() * W, y: -20 - Math.random() * H * 0.4,
                     vx: (Math.random() - 0.5) * 2.2, vy: Math.random() * 2.5 + 2,
                     s: Math.random() * 6 + 3, hue: Math.random() * 360,
                     rot: Math.random() * 6.28, vr: (Math.random() - 0.5) * 0.25 });
}
let toastT = null;
function toast(m){
  const t = $('toast'); t.textContent = m; t.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(() => t.classList.remove('show'), 2400);
}

/* ================= game flow ================= */
// keep a block of width w fully on screen (used whenever width is restored/grown)
function fitX(x, w){ return Math.max(w / 2 + 2, Math.min(W - w / 2 - 2, x)); }
function reset(){
  stack = [{ x: W / 2, y: 0, w: baseW(), hue: 205, land: 0, bh: B }];
  debris = []; parts = []; floats = []; confettis = [];
  floors = 0; combo = 0; newRec = false; beatChall = false;
  curZone = 0; timeScale = 1;
  nextBombAt = 8 + Math.floor(Math.random() * 5); nextCatAt = 12 + Math.floor(Math.random() * 7);
  camYT = -H * 0.62; camY = camYT; zoom = 1; zoomT = 1; shake = 0;
  $('floors').textContent = '0';
  $('combo').classList.add('hidden-hard');
}
function feverBH(){ return combo >= 3 ? B * Math.min(combo - 2, 4) : B; } // fever floors ramp 1,2,3,4,4...
function spawn(){
  const L = stack.length, top = stack[L - 1];
  const range = baseW() / 2 + Math.min(W * 0.2, 110);
  const gold = L > 0 && L % 10 === 0;
  const fev = combo >= 3;
  // during fever, specials get a small extra chance to appear early
  const bomb = !gold && floors >= 6 && (floors >= nextBombAt || (fev && Math.random() < 0.06));
  const cat  = !gold && !bomb && floors >= 10 && (floors >= nextCatAt || (fev && Math.random() < 0.06));
  const feverIdx = fev ? combo - 2 : 0;
  let spd = (Math.min(2.5 + floors * 0.065, 7.5) + Math.min(feverIdx * 0.45, 4.5)) * (W < 420 ? 0.95 : 1);
  if (bomb || cat) spd *= 1.8; // specials zip past in one fast pass — read fast!
  const dir = Math.random() < 0.5 ? 1 : -1;
  const bh = (!bomb && !cat) ? feverBH() : B; // fever blocks grow taller each step (1→2→3→4)
  cur = { x: W / 2 - dir * range, y: top.y - bh, w: top.w,
          dir, spd, range, gold, bomb, cat, bh,
          specials: (bomb || cat) ? 1 : 0, catUsed: cat, // ≤2 special passes; cat once, bomb may repeat
          hue: bomb ? 4 : gold ? 46 : (205 + L * 6) % 360 };
}
function blessing(forcedRoll){ // tapped the alpha cat: one of 3 random blessings
  cur = null;
  const roll = forcedRoll !== undefined ? forcedRoll : Math.random();
  const top0 = stack[stack.length - 1];
  for (let i = 0; i < 4; i++)
    floatTxt(top0.x + (Math.random() - 0.5) * 160, top0.y + Math.random() * 80, '🐾', '#fff', 16);
  nextCatAt = floors + 12 + Math.floor(Math.random() * 7);

  if (roll < 0.25 && top0.w < baseW() * 0.7){ // 1) full width restore — only when you need it
    top0.w = baseW(); top0.x = fitX(top0.x, top0.w); top0.land = 1.4;
    floatTxt(top0.x, top0.y - 30, '😼 몸집 복구 냥!! 풀사이즈', '#ffd76b', 21);
    firework(top0.x, top0.y, 16); flash = 0.4;
    sMeow();
    spawn();
  } else if (roll < 0.5){ // 2) instant fever infection — cat stacks one block to kick it off
    stack.push({ x: top0.x, y: top0.y - B, w: top0.w, hue: (205 + stack.length * 6) % 360,
                 land: 1.4, bh: B });
    floors++; $('floors').textContent = floors;
    camYT = stack[stack.length - 1].y - H * 0.62;
    combo = Math.max(combo, 5);
    $('combo').textContent = '🔥 FEVER x' + combo;
    $('combo').classList.remove('hidden-hard');
    floatTxt(top0.x, top0.y - B - 30, '😼🔥 알파 피버 전염!! +1층', '#ff9d4d', 22);
    firework(top0.x, top0.y - B, 16); flash = 0.4;
    tone(330, 0.07, 'square', 0.14);
    sMeow();
    spawn();
  } else { // 3) KWANG KWANG KWANG — 3..10 floors slam down, meow scales with count
    const n = 3 + Math.floor(Math.random() * 8);
    floatTxt(top0.x, top0.y - 34, '😼 알파냥 강림!!', '#ffd76b', 22);
    for (let i = 0; i < n; i++){
      setTimeout(() => {
        const t2 = stack[stack.length - 1];
        stack.push({ x: t2.x, y: t2.y - B, w: t2.w, hue: (205 + stack.length * 6) % 360,
                     land: 1.5, bh: B });
        floors++; $('floors').textContent = floors;
        shake = Math.max(shake, 7);
        tone(70 + Math.random() * 20, 0.18, 'sine', 0.5, 45); // KWANG
        tone(180, 0.06, 'square', 0.12);
        chips(t2.x - t2.w / 2, t2.y - B, 46, 3); chips(t2.x + t2.w / 2, t2.y - B, 46, 3);
        camYT = stack[stack.length - 1].y - H * 0.62;
        if (i === n - 1){ // finale
          floatTxt(t2.x, t2.y - 56, '😼 +' + n + '층!', '#ffd76b', 25);
          firework(t2.x, t2.y - 20, 22); flash = 0.5;
          sMeow();
          spawn();
        }
      }, 200 + i * 160);
    }
  }
}
function catchMiss(){ // tapped a special with no tower overlap — fumbled like a normal block
  if (!cur) return;
  floatTxt(cur.x, cur.y - 20, '허공을 짚었다!', '#ff8d7a', 18);
  debris.push({ x: cur.x, y: cur.y, w: cur.w, vy: -1.5, rot: 0, vr: 0.05, hue: cur.hue, bh: cur.bh });
  cur = null;
  die();
}
function explode(){ // tapped the bomb: top floors crumble, smoke, fade away
  const bx = cur.x, by = cur.y;
  cur = null;
  let lost = 0;
  const target = Math.min(10, Math.max(3, Math.ceil(floors * 0.25))); // scales with tower height
  const preFloors = floors; // bomb grace: nothing until you reclaim your peak
  const preW = stack[stack.length - 1].w; // remember the pre-blast top width
  while (stack.length > 1 && lost < target){
    const b = stack.pop();
    for (let i = -1; i <= 1; i++) // each block shatters into 3 fading chunks
      debris.push({ x: b.x + i * b.w / 3, y: b.y, w: Math.max(6, b.w / 3 - 2),
                    vx: i * (1.5 + Math.random() * 2) + (Math.random() - 0.5),
                    vy: -1 - Math.random() * 2.5,
                    rot: 0, vr: (Math.random() - 0.5) * 0.3,
                    hue: b.hue, bh: b.bh, t: 1 });
    parts.push({ smoke: true, x: b.x + (Math.random() - 0.5) * b.w * 0.6, y: b.y,
                 vx: (Math.random() - 0.5) * 0.8, vy: -0.4 - Math.random() * 0.8,
                 r: 8 + Math.random() * 10, t: 1 });
    lost += b.bh / B;
  }
  for (let i = 0; i < 8; i++) // smoke plume at the blast point
    parts.push({ smoke: true, x: bx + (Math.random() - 0.5) * 120, y: by + Math.random() * 60,
                 vx: (Math.random() - 0.5) * 1, vy: -0.5 - Math.random() * 1,
                 r: 10 + Math.random() * 14, t: 1 });
  floors = Math.max(0, floors - lost);
  $('floors').textContent = floors;
  combo = 0; $('combo').classList.add('hidden-hard');
  shake = 10;
  chips(bx, by, 4, 10);
  floatTxt(bx, by - 30, '💥 펑!! -' + lost + '층', '#ff6b5e', 22);
  sBoom();
  camYT = stack[stack.length - 1].y - H * 0.62;
  nextBombAt = preFloors + 11 + Math.floor(Math.random() * 8); // grace past previous peak
  spawn();
  cur.w = preW; // next block keeps the narrow pre-explosion width — no silver lining
}
function start(){
  ac(); bgmStart();
  reset(); spawn(); state = 'play';
  $('menu').classList.add('hidden');
  $('over').classList.add('hidden');
  $('hud').classList.remove('hidden');
  setBestUI();
}
function drop(){
  if (!cur) return;
  const top = stack[stack.length - 1];
  const dx = cur.x - top.x;
  const L = Math.max(cur.x - cur.w / 2, top.x - top.w / 2);
  const R = Math.min(cur.x + cur.w / 2, top.x + top.w / 2);
  const ov = R - L;

  if (ov <= 0){ // complete miss → game over
    debris.push({ x: cur.x, y: cur.y, w: cur.w, vy: -1.5, rot: 0,
                  vr: (dx > 0 ? 1 : -1) * 0.05, hue: cur.hue, bh: cur.bh });
    cur = null;
    die();
    return;
  }

  if (Math.abs(dx) <= PERF){ // perfect!
    combo++;
    const fever = combo >= 3;
    cur.x = top.x;
    cur.w = cur.gold ? baseW() : Math.min(cur.w + (fever ? 12 : GROW), baseW());
    ring(cur.x, cur.y + cur.bh / 2, cur.hue);
    if (cur.gold){
      floatTxt(cur.x, cur.y - 14, '💰 GOLDEN PERFECT!', '#ffd76b', 22);
      firework(cur.x, cur.y, 26); sGold();
    } else {
      floatTxt(cur.x, cur.y - 12, combo > 1 ? 'PERFECT x' + combo + '!' : 'PERFECT!', '#ffe177', 18 + Math.min(combo * 1.5, 10));
    }
    if (combo === 3){ floatTxt(cur.x, cur.y - 44, '🔥 FEVER TIME! 🔥', '#ff9d4d', 24); sFever(); }
    if (fever) firework(cur.x, cur.y + B / 2, 12);
    flash = 0.5;
    sPerfect(combo);
  } else {
    combo = 0;
    const pw = cur.w - ov;
    const px = dx > 0 ? R + pw / 2 : L - pw / 2;
    debris.push({ x: px, y: cur.y, w: pw, vy: -1.2, rot: 0,
                  vr: (dx > 0 ? 1 : -1) * 0.06, hue: cur.hue, bh: cur.bh });
    chips(dx > 0 ? R : L, cur.y, cur.hue);
    cur.x = (L + R) / 2; cur.w = ov;
    if (cur.gold){
      cur.w = Math.min(ov + 22, baseW());
      floatTxt(cur.x, cur.y - 14, '💰 너비 +22 회복!', '#ffd76b', 18);
      sGold();
    }
    shake = Math.max(shake, 3);
    sPlace();
    if (cur.w < baseW() * 0.32) tone(110, 0.18, 'triangle', 0.4, 55); // danger thump
  }

  cur.x = fitX(cur.x, cur.w); // never let a (re)grown block hang off screen
  stack.push({ x: cur.x, y: cur.y, w: cur.w, hue: cur.hue, land: 1, bh: cur.bh });
  floors += cur.bh / B; // double blocks count double
  if (cur.bh > B) floatTxt(cur.x + cur.w / 2 + 28, cur.y + cur.bh / 2, '+' + (cur.bh / B) + '층!', '#ffd76b', 16);
  $('floors').textContent = floors;
  $('combo').textContent = combo >= 3 ? '🔥 FEVER x' + combo : '🔥 PERFECT x' + combo;
  $('combo').classList.toggle('hidden-hard', combo < 2);

  if (challenge > 0 && !beatChall && floors > challenge){
    beatChall = true;
    floatTxt(cur.x, cur.y - 40, '친구 기록 돌파!! 🔥', '#7dffc4', 22);
    confetti(); sFanfare();
  }
  const zi = zoneIdxOf(floors);
  if (zi !== curZone){
    curZone = zi;
    if (ZONES[zi].name){
      floatTxt(cur.x, cur.y - 74, '⸺ ' + ZONES[zi].name + ' 진입 ⸺', '#ffffff', 23);
      flash = 0.6; sFanfare();
    }
  }

  camYT = cur.y - H * 0.62;
  spawn();
}
function die(){
  state = 'dying'; shake = 12; timeScale = 0.3; bgmStop(); sOver(); // slow-mo drama
  if (floors > best){
    best = floors; newRec = true;
    try { localStorage.setItem('skytower_best', best); } catch(e) {}
  }
  setTimeout(showOver, 800);
}
function showOver(){
  state = 'over'; timeScale = 1; overAt = performance.now();
  const towerH = (floors + 1) * B;

  const zi = zoneIdxOf(floors);
  $('finalZone').textContent = zi > 0 ? ZONES[zi].name + ' 도달!' : '';
  $('overBest').textContent = '🏆 최고 기록 ' + best + '층';
  $('newrec').classList.toggle('hidden-hard', !newRec);
  $('beat').classList.toggle('hidden-hard', !(beatChall && !newRec));

function tap(){
  if (state === 'menu') start();
  else if (state === 'play'){
    if (cur && cur.bomb) explode(); // you were told not to press
    else if (cur && cur.cat){ // the cat is judged by position, just like a normal block
      const top = stack[stack.length - 1];
      const ov = Math.min(cur.x + cur.w / 2, top.x + top.w / 2)
               - Math.max(cur.x - cur.w / 2, top.x - top.w / 2);
      if (ov > 0) blessing();   // caught over the tower → blessing
      else catchMiss();         // grabbed at thin air → miss, same as a normal block
    }
    else drop();
  }
  else if (state === 'over' && performance.now() - overAt > 1200) start(); // quick retry
}

/* ================= update & render ================= */
function lerpK(k, dt){ return 1 - Math.pow(1 - k, dt); }

function update(dt){
  camY += (camYT - camY) * lerpK(0.12, dt);
  zoom += (zoomT - zoom) * lerpK(0.09, dt);
  shake *= Math.pow(0.86, dt);
  flash *= Math.pow(0.85, dt);

  const zt = ZONES[zoneIdxOf(floors)];
  bgH = lerpHue(bgH, zt.h, lerpK(0.02, dt));
  bgS += (zt.s - bgS) * lerpK(0.02, dt);
  bgL += (zt.l - bgL) * lerpK(0.02, dt);

  if (state === 'play' && cur){
    cur.x += cur.dir * cur.spd * dt;
    if (cur.bomb || cur.cat){ // special pass; at the wall it may flip again (bomb can repeat, cat once)
      if ((cur.dir > 0 && cur.x > W / 2 + cur.range) || (cur.dir < 0 && cur.x < W / 2 - cur.range)){
        const wasBomb = cur.bomb;
        if (wasBomb) nextBombAt = floors + 11 + Math.floor(Math.random() * 8);
        else {
          nextCatAt = floors + 12 + Math.floor(Math.random() * 7);
          floatTxt(W / 2, stack[stack.length - 1].y - 60, '😼 …시크하게 지나갔다', '#9fb4e8', 14);
        }
        cur.x = cur.dir > 0 ? W / 2 + cur.range : W / 2 - cur.range;
        cur.dir = -cur.dir;
        cur.bomb = false; cur.cat = false;
        const r = Math.random();
        if (cur.specials < 2 && wasBomb && r < 0.40){ // bomb → bomb (can appear twice)
          cur.bomb = true; cur.specials++;
          floatTxt(cur.x, cur.y - 16, '!?', '#ff8d7a', 18);
        } else if (cur.specials < 2 && wasBomb && !cur.catUsed && r < 0.70){ // bomb → cat
          cur.cat = true; cur.catUsed = true; cur.specials++;
          floatTxt(cur.x, cur.y - 16, '!?', '#ffd76b', 18);
        } else if (cur.specials < 2 && !wasBomb && r < 0.50){ // cat → bomb
          cur.bomb = true; cur.specials++;
          floatTxt(cur.x, cur.y - 16, '!?', '#ff8d7a', 18);
        } else { // settle into a normal block (normal blocks never turn special)
          cur.spd /= 1.8;
          cur.hue = (205 + stack.length * 6) % 360;
          cur.bh = feverBH(); cur.y = stack[stack.length - 1].y - cur.bh; // honor active fever
        }
      }
    } else {
      let wall = 0; // -1 hit left wall, +1 hit right wall
      if (cur.x < W / 2 - cur.range){ cur.x = W / 2 - cur.range; cur.dir = 1; wall = -1; }
      if (cur.x > W / 2 + cur.range){ cur.x = W / 2 + cur.range; cur.dir = -1; wall = 1; }
      if (wall){
        cur.bounces = (cur.bounces || 0) + 1;
        if (cur.bounces >= 3){ // stalling penalty: the wall slices the struck edge clean off
          const trim = Math.max(12, cur.w * 0.1);
          const edge = cur.x + wall * cur.w / 2; // the tip that struck the wall
          if (cur.w - trim <= 8){ // nothing left to stack → game over
            debris.push({ x: cur.x, y: cur.y, w: cur.w, vy: -1.2, rot: 0, vr: wall * 0.15, hue: cur.hue, bh: cur.bh });
            floatTxt(edge, cur.y - 16, '✂️', '#fff', 24);
            cur = null; die();
          } else { // the cut-off slice tumbles away; block keeps the far edge fixed
            debris.push({ x: edge - wall * trim / 2, y: cur.y, w: trim, vy: -1.4, rot: 0, vr: wall * 0.16, hue: cur.hue, bh: cur.bh });
            cur.w -= trim; cur.x -= wall * trim / 2;
            floatTxt(edge, cur.y - 16, '✂️', '#fff', 22);
            tone(280, 0.06, 'square', 0.1);
          }
        }
      }
    }
    tick++;
    if (cur && combo >= 3 && tick % 2 === 0) // fever trail (cur may be gone after a fatal trim)
      parts.push({ x: cur.x + (Math.random() - 0.5) * cur.w, y: cur.y + B,
                   vx: (Math.random() - 0.5) * 1.5, vy: Math.random() * 1.5 + 0.5,
                   s: 3, t: 0.7, hue: Math.random() * 360 });
  }
  for (const b of stack) if (b.land > 0) b.land = Math.max(0, b.land - 0.12 * dt);

  for (let i = debris.length - 1; i >= 0; i--){
    const d = debris[i];
    d.vy += 0.55 * dt; d.y += d.vy * dt; d.x += (d.vx || 0) * dt; d.rot += d.vr * dt;
    if (d.t !== undefined){ d.t -= 0.022 * dt; if (d.t <= 0){ debris.splice(i, 1); continue; } }
    if (d.y - camY > H / Math.min(zoom, 1) + 400) debris.splice(i, 1);
  }
  for (let i = parts.length - 1; i >= 0; i--){
    const p = parts[i];
    if (p.ring){ p.r += p.vr * dt; p.t -= 0.045 * dt; }
    else if (p.smoke){ p.x += p.vx * dt; p.y += p.vy * dt; p.r += 0.45 * dt; p.t -= 0.016 * dt; }
    else { p.vy += 0.3 * dt; p.x += p.vx * dt; p.y += p.vy * dt; p.t -= 0.03 * dt; }
    if (p.t <= 0) parts.splice(i, 1);
  }
  for (let i = floats.length - 1; i >= 0; i--){
    const f = floats[i];
    f.y += f.vy * dt; f.t -= 0.016 * dt;
    if (f.t <= 0) floats.splice(i, 1);
  }
  for (let i = confettis.length - 1; i >= 0; i--){
    const c = confettis[i];
    c.x += c.vx * dt; c.y += c.vy * dt; c.rot += c.vr * dt;
    if (c.y > H + 30) confettis.splice(i, 1);
  }
}

function drawBlock(x, y, w, hue, glow, land, gold, bh){
  const hpx = bh || B;
  const sy = land ? 1 - 0.16 * land : 1;
  const h = hpx * sy, yy = y + hpx - h;
  const g = ctx.createLinearGradient(0, yy, 0, yy + h);
  g.addColorStop(0, 'hsl(' + hue + ',' + (gold ? 90 : 64) + '%,' + (gold ? 64 : 60) + '%)');
  g.addColorStop(1, 'hsl(' + hue + ',' + (gold ? 85 : 60) + '%,' + (gold ? 48 : 44) + '%)');
  ctx.fillStyle = g;
  if (glow){ ctx.shadowColor = 'hsla(' + hue + ',85%,65%,.85)'; ctx.shadowBlur = 16; }
  ctx.fillRect(x - w / 2, yy, w, h);
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,.25)';
  ctx.fillRect(x - w / 2, yy, w, 2.5);
  ctx.fillStyle = 'rgba(0,0,0,.2)';
  ctx.fillRect(x - w / 2, yy + h - 2.5, w, 2.5);
  if (gold){ // moving shine band
    ctx.save();
    ctx.beginPath(); ctx.rect(x - w / 2, yy, w, h); ctx.clip();
    const bx = x - w / 2 + ((performance.now() * 0.12) % (w + 30)) - 15;
    ctx.globalAlpha = 0.4; ctx.fillStyle = '#fff';
    ctx.fillRect(bx, yy, 12, h);
    ctx.restore(); ctx.globalAlpha = 1;
  }
}

function drawCat(x, y, w){ // looks suspiciously like the bomb — read fast!
  const p = 0.6 + 0.4 * Math.sin(performance.now() * 0.014);
  ctx.shadowColor = 'rgba(190,120,255,' + (0.4 + 0.5 * p).toFixed(2) + ')'; ctx.shadowBlur = 22;
  const g = ctx.createLinearGradient(0, y, 0, y + B);
  g.addColorStop(0, 'hsl(266,55%,' + Math.round(26 + p * 12) + '%)');
  g.addColorStop(1, 'hsl(258,60%,13%)');
  ctx.fillStyle = g; ctx.fillRect(x - w / 2, y, w, B);
  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(255,215,107,' + (0.5 + 0.5 * p).toFixed(2) + ')'; ctx.lineWidth = 2;
  ctx.strokeRect(x - w / 2 + 1, y + 1, w - 2, B - 2);
  ctx.font = '20px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('😼', x, y + B / 2 + 1);
  ctx.textBaseline = 'alphabetic';
  ctx.font = '800 15px sans-serif'; ctx.fillStyle = '#ffd76b';
  ctx.globalAlpha = 0.7 + 0.3 * p;
  ctx.fillText('눌러라 냥!!', x, y - 10);
  ctx.globalAlpha = 1;
}

function drawBomb(x, y, w){
  const p = 0.6 + 0.4 * Math.sin(performance.now() * 0.014);
  ctx.shadowColor = 'rgba(255,50,30,' + (0.4 + 0.5 * p).toFixed(2) + ')'; ctx.shadowBlur = 22;
  const g = ctx.createLinearGradient(0, y, 0, y + B);
  g.addColorStop(0, 'hsl(6,75%,' + Math.round(28 + p * 14) + '%)');
  g.addColorStop(1, 'hsl(0,80%,15%)');
  ctx.fillStyle = g; ctx.fillRect(x - w / 2, y, w, B);
  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(255,90,60,' + (0.5 + 0.5 * p).toFixed(2) + ')'; ctx.lineWidth = 2;
  ctx.strokeRect(x - w / 2 + 1, y + 1, w - 2, B - 2);
  ctx.font = '20px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('💣', x, y + B / 2 + 1);
  ctx.textBaseline = 'alphabetic';
  ctx.font = '800 15px sans-serif'; ctx.fillStyle = '#ff8d7a';
  ctx.globalAlpha = 0.7 + 0.3 * p;
  ctx.fillText('누르지 마!!', x, y - 10);
  ctx.globalAlpha = 1;
}

function drawTargetLine(n, col, label){
  if (n <= 0) return;
  const y = -n * B - camY;
  const eff = (y - H * 0.88) * zoom + H * 0.88;
  if (eff < -30 || eff > H + 30) return;
  ctx.save();
  ctx.strokeStyle = col; ctx.globalAlpha = 0.55; ctx.lineWidth = 1.5;
  ctx.setLineDash([7, 7]);
  ctx.beginPath(); ctx.moveTo(14, y); ctx.lineTo(W - 14, y); ctx.stroke();
  ctx.setLineDash([]);
  ctx.globalAlpha = 0.9; ctx.fillStyle = col;
  ctx.font = '700 12px sans-serif'; ctx.textAlign = 'right';
  ctx.fillText(label + ' ' + n + '층', W - 16, y - 6);
  ctx.restore();
}

function render(){
  // sky (zone-colored, lerped)
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, 'hsl(' + Math.round((bgH + 26) % 360) + ',' + Math.round(bgS * 0.9) + '%,' + Math.max(4, Math.round(bgL * 0.35)) + '%)');
  g.addColorStop(1, 'hsl(' + Math.round(bgH) + ',' + Math.round(bgS) + '%,' + Math.round(bgL) + '%)');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  // stars (parallax + twinkle)
  ctx.fillStyle = '#fff';
  const off = -camY * 0.3, span = H + 80, tNow = performance.now();
  for (const s of stars){
    const sy = ((s.y * span + off) % span + span) % span - 40;
    ctx.globalAlpha = s.a * (0.7 + 0.3 * Math.sin(tNow * 0.001 * s.tw + s.x * 40));
    ctx.beginPath(); ctx.arc(s.x * W, sy, s.r, 0, 6.283); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // world (camera + shake + game-over zoom)
  ctx.save();
  ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
  ctx.translate(W / 2, H * 0.88); ctx.scale(zoom, zoom); ctx.translate(-W / 2, -H * 0.88);

  for (let i = 0; i < stack.length; i++){
    const b = stack[i], y = b.y - camY;
    if (i > 0 && zoom === 1 && (y > H + B || y < -2 * B)) continue;
    if (i === 0){ // foundation column
      const gg = ctx.createLinearGradient(0, y, 0, y + 600);
      gg.addColorStop(0, 'hsl(205,55%,42%)'); gg.addColorStop(1, 'hsl(225,55%,12%)');
      ctx.fillStyle = gg;
      ctx.fillRect(b.x - b.w / 2, y, b.w, 4000);
      ctx.fillStyle = 'rgba(255,255,255,.25)';
      ctx.fillRect(b.x - b.w / 2, y, b.w, 2.5);
      continue;
    }
    drawBlock(b.x, y, b.w, b.hue, false, b.land, false, b.bh);
  }

  drawTargetLine(challenge, '#ffa94d', '🔥 친구');
  if (best > 0 && best !== challenge) drawTargetLine(best, '#6be0ff', '🏆 내 최고');

  for (const d of debris){
    ctx.save();
    if (d.t !== undefined) ctx.globalAlpha = Math.max(0, d.t); // shattered chunks fade out
    ctx.translate(d.x, d.y - camY + (d.bh || B) / 2); ctx.rotate(d.rot);
    drawBlock(0, -(d.bh || B) / 2, d.w, d.hue, false, 0, false, d.bh);
    ctx.restore();
  }

  if (state === 'play' && cur){
    if (cur.bomb) drawBomb(cur.x, cur.y - camY, cur.w);
    else if (cur.cat) drawCat(cur.x, cur.y - camY, cur.w);
    else drawBlock(cur.x, cur.y - camY, cur.w,
              combo >= 3 ? (performance.now() * 0.12) % 360 : cur.hue, // fever rainbow
              true, 0, cur.gold, cur.bh);
  }

  for (const p of parts){
    if (p.smoke){
      ctx.globalAlpha = Math.max(0, p.t) * 0.4;
      ctx.fillStyle = '#a8aeb8';
      ctx.beginPath(); ctx.arc(p.x, p.y - camY, p.r, 0, 6.283); ctx.fill();
    } else if (p.ring){
      ctx.globalAlpha = Math.max(0, p.t);
      ctx.strokeStyle = 'hsl(' + p.hue + ',90%,72%)'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(p.x, p.y - camY, p.r, 0, 6.283); ctx.stroke();
    } else {
      ctx.globalAlpha = Math.max(0, p.t);
      ctx.fillStyle = 'hsl(' + p.hue + ',75%,62%)';
      ctx.fillRect(p.x - p.s / 2, p.y - camY - p.s / 2, p.s, p.s);
    }
  }
  ctx.globalAlpha = 1;

  ctx.font = '800 17px sans-serif'; ctx.textAlign = 'center';
  for (const f of floats){
    ctx.globalAlpha = Math.max(0, Math.min(1, f.t * 1.4));
    ctx.font = '800 ' + f.size + 'px sans-serif';
    ctx.fillStyle = f.col;
    ctx.shadowColor = 'rgba(0,0,0,.45)'; ctx.shadowBlur = 6;
    ctx.fillText(f.txt, f.x, f.y - camY);
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;

  if (state === 'play' && floors === 0 && cur){
    ctx.globalAlpha = 0.85; ctx.fillStyle = '#cfe0ff';
    ctx.font = '700 15px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('타이밍 맞춰 탭! 👆', W / 2, cur.y - camY - 22);
    ctx.globalAlpha = 1;
  }
  ctx.restore();

  // danger vignette (tower critically narrow)
  if (state === 'play' && stack[stack.length - 1].w < baseW() * 0.32){
    const a = 0.14 + 0.10 * Math.sin(performance.now() * 0.009);
    const rg = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.35, W / 2, H / 2, Math.max(W, H) * 0.8);
    rg.addColorStop(0, 'rgba(255,40,40,0)');
    rg.addColorStop(1, 'rgba(255,30,30,' + a.toFixed(3) + ')');
    ctx.fillStyle = rg; ctx.fillRect(0, 0, W, H);
  }

  // screen-space confetti
  for (const c of confettis){
    ctx.save();
    ctx.translate(c.x, c.y); ctx.rotate(c.rot);
    ctx.fillStyle = 'hsl(' + c.hue + ',85%,62%)';
    ctx.fillRect(-c.s / 2, -c.s / 2, c.s, c.s * 0.6);
    ctx.restore();
  }

  if (flash > 0.02){
    ctx.globalAlpha = flash * 0.25;
    ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }
}

let last = performance.now();
function frame(now){
  const dt = Math.min(2.5, Math.max(0.25, (now - last) / 16.667)) * timeScale;
  last = now;
  update(dt);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  render();
  requestAnimationFrame(frame);
}

/* ================= init ================= */
resize();
reset();
setBestUI();
if (challenge > 0){
  const c = $('challenge');
  c.textContent = '🔥 친구가 ' + challenge + '층 도전장을 보냈어!';
  c.classList.remove('hidden-hard');
}
requestAnimationFrame(frame);

/* test hook (tiny, harmless) */
window.__sky = {
  tap,
  state: () => state,
  floors: () => floors,
  combo: () => combo,
  zone: () => zoneIdxOf(floors),
  topW: () => stack[stack.length - 1].w,
  gold: () => !!(cur && cur.gold),
  align(){ if (cur) cur.x = stack[stack.length - 1].x; },
  offset(px){ if (cur) cur.x = stack[stack.length - 1].x + px; },
  miss(){ if (cur) cur.x = stack[stack.length - 1].x + stack[stack.length - 1].w + cur.w; },
  bomb: () => !!(cur && cur.bomb),
  cat: () => !!(cur && cur.cat),
  nextBomb: () => nextBombAt,
  curW: () => cur ? Math.round(cur.w) : 0,
  _cur: () => cur,
  _top: () => stack[stack.length - 1],
  topX: () => stack[stack.length - 1].x,
  curBH: () => cur ? cur.bh / B : 0,
  nDebris: () => debris.length,
  _step: (dt) => update(dt || 1),
  W: () => W,
  bless(r){ blessing(r); },
  makeBomb(){ if (cur){ cur.bomb = true; cur.cat = false; cur.specials = 1; cur.catUsed = false; cur.bh = B; cur.y = stack[stack.length - 1].y - B; } },
  makeCat(){ if (cur){ cur.cat = true; cur.bomb = false; cur.specials = 1; cur.catUsed = true; cur.bh = B; cur.y = stack[stack.length - 1].y - B; } }
};
</script>
